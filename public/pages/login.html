<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin | Berkesan Coffee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="/assets/css/login.css">
</head>

<body>
  <div class="card">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon"><i class="fa-solid fa-mug-hot"></i></div>
      <div>
        <div class="logo-name">Berkesan</div>
        <div class="logo-sub">Admin Panel</div>
      </div>
    </div>

    <!-- Heading -->
    <div class="heading">
      <h1>Selamat Datang 👋</h1>
      <p>Masuk ke dashboard Berkesan</p>
      <p class="captcha-question">Captcha: <strong id="captchaQuestion"></strong></p>
    </div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span id="errorText">Email atau password salah</span>
    </div>

    <!-- Form -->
    <form class="form" id="loginForm">
      <div class="field">
        <label>Username</label>
        <div class="input-wrap">
          <i class="fa-solid fa-user prefix"></i>
          <input type="text" name="username" placeholder="Masukkan username…" autocomplete="username" />
        </div>
      </div>

      <div class="field">
        <label>Kata Sandi</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock prefix"></i>
          <input type="password" id="passwordInput" name="password" placeholder="••••••••" class="has-suffix" autocomplete="current-password" />
          <button type="button" class="btn-eye" onclick="togglePassword()">
            <i class="fa-solid fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <div class="field">
        <label>Captcha</label>
        <div class="input-wrap">
          <i class="fa-solid fa-calculator prefix"></i>
          <input type="number" id="captchaInput" placeholder="Jawaban…" autocomplete="off" />
        </div>
      </div>

      <div class="options">
        <label class="remember">
          <input type="checkbox" /> Ingat saya
        </label>
        <a href="#" class="forgot">Lupa password?</a>
      </div>

      <button type="submit" class="btn-submit">
        <i class="fa-solid fa-arrow-right-to-bracket"></i>
        Masuk ke Dashboard
      </button>
    </form>

    <div class="footer">Brewed with passion · Secure Admin Zone</div>
  </div>

  <script src="../js/api.config.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
